spring:
  ai:
    openai:
      qwen:
        api-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        api-key: ${QWEN_API_KEY:sk-af41394721784ff4974ea0f5d0b97864}
        chat:
          options:
              model: qwen3.6-plus

      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:sk-4862cf031c274f5a838c7db10ba6cbf1}
      chat:
        options:
          model: deepseek-v4-flash
          temperature: 0.7
          max-tokens: 4096
      # 添加超时配置
      timeout: 60s
      connection-timeout: 30s

  # H2 内存数据库（开发阶段，不需要安装MySQL）
  datasource:
    url: jdbc:h2:file:./data/smartagent-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

    # H2 控制台（开发用，浏览器访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: root
      database: 0
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
smart-agent:
  jwt:
    secret: smartagent-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-hours: 24
  models:
    default-model: deepseek-v4-flash
    available:
      deepseek: deepseek-v4-flash
      deepseek-chat: deepseek-chat
  rag:
    vector-store-path: ./data/vectorstore/vector-store.json
    chunk-size: 120
    chunk-overlap: 30
    top-k: 5
    similarity-threshold: 0.5
  rate-limit:
    max-requests-per-minute: 30

# DashScope Embedding 配置（阿里云通义千问）
dashscope:
  api-key: ${QWEN_API_KEY:sk-af41394721784ff4974ea0f5d0b97864}
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  embedding-model: text-embedding-v4

logging:
  level:
    com.chat.myAgent: debug
    org.springframework.ai: info
    org.springframework.security: info
