spring:
  ai:
    openai:
      qwen:
        api-base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: ${QWEN_API_KEY:your-qwen-api-key-here}
        chat:
          options:
            model: qwen3.6-plus

      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY:your-DeepSeek-api-key-here}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
          max-tokens: 4096
      # 自动配置路径下的超时（当前项目手工Bean未必完全使用，仅保留兼容）
      timeout: 60s
      connection-timeout: 30s

  # MySQL 数据库（开发阶段）
  datasource:
    url: jdbc:mysql://localhost:3306/smart_agent_auth?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: root
      database: 3
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
smart-agent:
  jwt:
    secret: smartagent-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-hours: 24
  network:
    connect-timeout: 8s
    read-timeout: 25s
  retry:
    primary:
      max-attempts: 1
    fallback:
      max-attempts: 1
    backoff-ms: 200
  models:
    default-model: deepseek-chat
    available:
      deepseek: deepseek-chat
      deepseek-chat: deepseek-chat
  rag:
    vector-store-path: ./data/vectorstore/vector-store.json
    chunk-size: 120
    chunk-overlap: 30
    top-k: 5
    similarity-threshold: 0.5
  rate-limit:
    max-requests-per-minute: 30

# DashScope Embedding 配置（阿里云通义千问）
dashscope:
  api-key: ${QWEN_API_KEY:your-dashscope-api-key-here}
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  embedding-model: text-embedding-v4

logging:
  level:
    com.chat.myAgent: debug
    org.springframework.ai: info
    org.springframework.security: info
