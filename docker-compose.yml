version: '3.8'

services:
  app:
    build: .
    container_name: myagent-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DeepSeek_API_KEY=${DeepSeek_API_KEY}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/myagent?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - redis
      - mysql

  redis:
    image: redis:7-alpine
    container_name: myagent-redis
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    container_name: myagent-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: myagent
    ports:
      - "3306:3306"